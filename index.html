const QUESTIONS=[{"id": "Q1", "cat": "テストの基本", "textHtml": "テストの目的として**最も適切**なのはどれか。", "choices": ["品質を保証する責任を持つこと", "欠陥が存在しないことを証明すること", "欠陥を検出し、品質に関する情報を提供すること", "すべてのリスクを排除すること"], "answer": "C", "img": null, "explain": "テストは欠陥検出と情報提供。保証や完全排除は目的ではない。"}, {"id": "Q2", "cat": "テストの基本", "textHtml": "『欠陥が見つからない』という結果の解釈として最も適切なのはどれか。", "choices": ["品質が高いことの証明である", "テストケースが十分だったことの証明である", "残留リスクが存在しないことを示す", "検出されなかった欠陥が存在する可能性は残る"], "answer": "D", "img": null, "explain": "テストは欠陥の不存在を証明しない。"}, {"id": "Q3", "cat": "テストの基本", "textHtml": "バグゼロの誤謬に該当する判断はどれか。", "choices": ["重大欠陥があればリリース延期する", "テストで欠陥が見つからないため出荷する", "出口基準を満たしたためリリースする", "残留リスクを説明した上で出荷判断する"], "answer": "B", "img": null, "explain": "欠陥未検出＝高品質と判断するのが誤謬。"}, {"id": "Q4", "cat": "テストの基本", "textHtml": "欠陥の偏在の考え方から導かれる適切な行動はどれか。", "choices": ["テストケース数を増やす", "高リスク・高複雑度領域に重点配分する", "すべて均等に実施する", "レビューをやめる"], "answer": "B", "img": null, "explain": "集中領域に重点化。"}, {"id": "Q5", "cat": "SDLCとテスト", "textHtml": "確認テストと回帰テストの組み合わせとして正しいものはどれか。", "choices": ["確認＝副作用、回帰＝修正確認", "確認＝修正確認、回帰＝副作用確認", "両方とも副作用確認", "両方とも修正確認"], "answer": "B", "img": null, "explain": "確認＝当該欠陥、回帰＝影響確認。"}, {"id": "Q6", "cat": "SDLCとテスト", "textHtml": "非機能テストに該当するものはどれか。", "choices": ["分岐網羅テスト", "入力境界値テスト", "高負荷時の応答時間測定", "状態遷移確認"], "answer": "C", "img": null, "explain": "性能は非機能。"}, {"id": "Q7", "cat": "ホワイトボックス", "textHtml": "ステートメントカバレッジ100%で保証されないものはどれか。", "choices": ["全ての文が少なくとも1回実行される", "全ての分岐結果が実行される", "未実行文が存在しない", "テストケースが存在する"], "answer": "B", "img": null, "explain": "文網羅では分岐両結果は保証しない。"}, {"id": "Q8", "cat": "ホワイトボックス", "textHtml": "ブランチカバレッジ100%で保証されるものはどれか。", "choices": ["全パス実行", "各分岐の真偽が少なくとも1回実行される", "各条件の独立性", "MC/DC達成"], "answer": "B", "img": null, "explain": "分岐の両結果。"}, {"id": "Q9", "cat": "静的テスト", "textHtml": "ウォークスルーの特徴はどれか。", "choices": ["形式的で役割固定", "作成者主導で理解促進目的", "自動化前提", "必ず欠陥密度を測定"], "answer": "B", "img": null, "explain": "比較的非公式。"}, {"id": "Q10", "cat": "静的テスト", "textHtml": "インスペクションの特徴はどれか。", "choices": ["非公式", "役割・入口基準・出口基準が明確", " const root=document.getElementById("quiz");
QUESTIONS.forEach((q,i)=>{
 let div=document.createElement("div");
 div.className="q";
 div.innerHTML="<b>Q"+(i+1)+"</b> ["+q.cat+"]<br>"+q.textHtml.replace(/\n/g,"<br>");
 q.choices.forEach((c,idx)=>{
  let val=String.fromCharCode(65+idx);
  div.innerHTML+=`<label><input type="radio" name="${q.id}" value="${val}"> ${val}. ${c}</label>`;
 });
 root.appendChild(div);
});
function submitQuiz(){
 let correct=0;
 const details=[];
 QUESTIONS.forEach((q,i)=>{
  let sel=document.querySelector('input[name="'+q.id+'"]:checked');
  let u=sel?sel.value:"";
  if(u===q.answer)correct++;
  details.push([`Q${i+1}`,q.cat,u,q.answer,(u===q.answer)?"○":"×",q.explain]);
 });
 let pct=Math.round(correct/QUESTIONS.length*100);
 let passed=pct>=PASS_MARK;
 document.getElementById("result").style.display="block";
 document.getElementById("result").innerHTML=`正解数:${correct}/${QUESTIONS.length} 正答率:${pct}% 判定:${passed?"合格":"不合格"}`;
 window.__RESULT={details,date:new Date().toLocaleString(),correct,total:QUESTIONS.length,pct,passed};
 document.getElementById("dl").style.display="inline-block";
}
function downloadTSV(){
 const r=window.__RESULT;
 const rows=[["日時","正解数","合計","正答率","判定"],
             [r.date,r.correct,r.total,r.pct+"%",r.passed?"合格":"不合格"],
             [],
             ["問","分類","あなたの解答","正解","正誤","解説"]];
 r.details.forEach(d=>rows.push(d));
 const tsv=rows.map(r=>r.join("\t")).join("\n");
 const blob=new Blob(["\ufeff"+tsv],{type:"text/tab-separated-values;charset=utf-8;"});
 const a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="JSTQB_CTFL4_VersionC_result.tsv";
 a.click();
}
